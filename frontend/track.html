<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Request – Service Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="navbar-content">
        <div class="logo">
            <div class="logo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
            </div>
            Service Portal
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="submit.html" class="nav-link">Submit</a>
            <a href="track.html" class="nav-link active">Track</a>
        </div>
    </div>
</nav>

<main class="main">
    <div class="card">
        <div class="card-header" style="text-align:left;">
            <h1 class="card-title">Track Request</h1>
            <p class="card-description">Enter your request ID to check the current status.</p>
        </div>

        <div class="form-group">
            <label class="form-label">Request ID</label>
            <input type="text" class="form-input" id="requestId" placeholder="e.g., REQ-2024-XXXXX">
        </div>
        <button onclick="trackRequest()" class="btn btn-primary">Track Status</button>

        <div class="error-text" id="trackError">Request not found. Please check the ID and try again.</div>

        <div class="status-card" id="statusCard">
            <div class="status-header">
                <span class="status-id" id="displayId"></span>
                <span class="status-badge" id="statusBadge"></span>
            </div>
            <div class="status-details">
                <div class="status-row">
                    <span class="status-label">Name</span>
                    <span class="status-value" id="displayName">—</span>
                </div>
                <div class="status-row">
                    <span class="status-label">Email</span>
                    <span class="status-value" id="displayEmail">—</span>
                </div>
                <div class="status-row">
                    <span class="status-label">Location</span>
                    <span class="status-value" id="displayLocation">—</span>
                </div>
                <div class="status-row">
                    <span class="status-label">Description</span>
                    <span class="status-value" id="displayDescription">—</span>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="app.js"></script>
</body>
</html>
