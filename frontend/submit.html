<!DOCTYPE html>
<html>
<head>
  <title>Submit Request</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-content">
    <div class="logo">Service Portal</div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="submit.html" class="nav-link active">Submit</a>
      <a href="track.html" class="nav-link">Track</a>
    </div>
  </div>
</nav>

<main class="main">
  <div class="card">
    <div class="card-header">
      <h1 class="card-title">Submit Request</h1>
    </div>

    <form id="submitForm">
      <input class="form-input" id="name" placeholder="Name" required>
      <input class="form-input" id="email" placeholder="Email" required>
      <input class="form-input" id="location" placeholder="Location">
      <textarea class="form-textarea" id="description" placeholder="Description"></textarea>

      <button class="btn btn-primary">Submit</button>
    </form>

    <div class="success-message" id="successMessage">
      <div class="success-title">Submitted ✅</div>
      <div id="generatedId"></div>
    </div>

  </div>
</main>

<script src="app.js"></script>
</body>
</html>
